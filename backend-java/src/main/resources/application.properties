# Load Gmail credentials: put application-local.properties in backend-java folder (or project root)
# When you run from backend-java, ../ = project root. Try parent first so root file is found.
spring.config.import=optional:file:../application-local.properties,optional:file:./application-local.properties

# Server
server.port=5000

# MongoDB (same DB as Node backend - can share data)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/gift-mart}
spring.data.mongodb.auto-index-creation=false

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-change-in-production-make-it-long-enough}
jwt.expiration=${JWT_EXPIRES_IN:7d}

# Frontend (CORS)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Error reporting
server.error.include-message=always
server.error.include-stacktrace=always

# File upload (for product images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Mail (Gmail) - for sending newsletter verification code to real emails
# 1. Turn on 2-Step Verification: https://myaccount.google.com/security
# 2. Create App Password: https://myaccount.google.com/apppasswords (choose "Mail") - use that 16-char password, NOT your Gmail password
# 3. Set below in application-local.properties (in backend-java folder) OR use run-with-mail.ps1
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Debug: set to true to see full SMTP error in console when send fails
logging.level.org.springframework.mail=DEBUG
# Sender address (usually same as username)
app.newsletter.from=${SPRING_MAIL_USERNAME:}
